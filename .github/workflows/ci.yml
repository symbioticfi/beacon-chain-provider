name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Votingpower Stubs
        run: |
          ./scripts/update-votingpower-stubs.sh
          git diff --exit-code -- api/gen/votingpower/v1

      - name: Run Tests
        run: go test ./...

      - name: Build Binary
        run: go build ./cmd/beacon-vp
